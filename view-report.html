<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Analysis Result</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      html,
      body {
        padding: 0;
        margin: 0;
      }

      #container {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
      }

      #info-bar {
        width: 100%;
        height: 30%;
        position: fixed;
        left: 0;
        bottom: 0;
      }

      #file-info {
        height: 100%;
        overflow: auto;
      }

      svg {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div id="info-bar" class="bg-light p-4 shadow">
      <div class="row h-100">
        <div class="col-2">
          <h5 class="mb-2">Display</h5>

          <div class="row">
            <div class="col-12">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="graphDisplay"
                  value="cycles"
                  id="cycles"
                  checked
                />
                <label class="form-check-label" for="cycles">Cycles Only</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="graphDisplay"
                  value="connected"
                  id="connected"
                />
                <label class="form-check-label" for="connected"
                  >Connected Only</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="graphDisplay"
                  value="full"
                  id="full"
                />
                <label class="form-check-label" for="full"
                  >Full Graph (slow)</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="graphDisplay"
                  value="orphans"
                  id="orphans"
                />
                <label class="form-check-label" for="orphans"
                  >Orphans Only</label
                >
              </div>
            </div>
          </div>

          <div class="mb-3 form-check mt-3">
            <input
              class="form-check-input"
              type="checkbox"
              name="showFileNames"
              id="showFileNames"
            />
            <label class="form-check-label" for="showFileNames"
              >Show file names</label
            >
          </div>
        </div>
        <div class="col-3 d-flex flex-column h-100">
          <h5 class="mb-2">File Types</h5>
          <div class="mb-2" style="font-size: 0.85em; color: #555">
            Files: <strong id="stat-files">0</strong> | Edges:
            <strong id="stat-edges">0</strong> | Cycles:
            <strong id="stat-cycles">0</strong>
          </div>
          <div class="mb-2">
            <a
              href="#"
              id="toggle-all-types"
              class="text-decoration-none"
              style="font-size: 0.9em"
              >Select All</a
            >
          </div>
          <div
            class="d-flex flex-column flex-grow-1 overflow-y-auto"
            id="file-types-list"
          ></div>
        </div>
        <div class="col-3 d-flex flex-column h-100">
          <h5 class="mb-2">Search</h5>
          <div class="mb-3 input-group">
            <input
              type="search"
              class="form-control"
              placeholder="Search file..."
              id="search-box"
            />
          </div>
          <div class="d-flex flex-column flex-grow-1 overflow-y-auto">
            <div class="list-group" id="search-result"></div>
          </div>
        </div>
        <div class="col-4 d-flex flex-column h-100">
          <div
            class="mb-3 d-flex flex-column flex-grow-1 overflow-y-auto"
            id="file-info"
            style="display: none !important"
          >
            <h5 class="mb-2">File Info</h5>
            <p><b>File Name:</b>&nbsp;<code id="filename"></code></p>
            <p>
              <b>Cycles (<span id="cycle-count"></span>)</b>:
            </p>
            <ul id="cycle-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const id = (nodeId) => btoa(nodeId).replaceAll("=", "");

    let cachedFiles = [];
    window.currentCycles = [];

    const getFileType = (filename) => {
      const match = filename.match(/\.[^/.]+$/);
      return match ? match[0] : "";
    };

    const fileTypeColors = {
      ".rb": "#CC342D",
      ".slim": "#8B5CF6",
      ".js": "#F7DF1E",
      ".jsx": "#61DAFB",
      ".ts": "#3178C6",
      ".tsx": "#06B6D4",
    };

    const getColor = (filename) => {
      const ext = getFileType(filename);
      return fileTypeColors[ext] || "#6B7280";
    };

    function search(searchTerm) {
      const searchResultList = document.querySelector("#search-result");
      const potentialMatches = cachedFiles.filter((file) =>
        file.includes(searchTerm)
      );

      let html = "";
      for (const file of potentialMatches) {
        html += ` <button type="button" class="list-group-item list-group-item-action search-result" value="${file}">${file}</button>`;
      }
      searchResultList.innerHTML = html;
      document
        .querySelectorAll(".search-result")
        .forEach(
          (result) =>
            (result.onclick = (e) => showFileInfo({ id: e.target.value }))
        );
    }

    document.getElementById("search-box").oninput = (e) =>
      search(e.target.value);

    function showFileInfo(file) {
      const cycles = window.currentCycles.filter((cycle) =>
        cycle.some((n) => n === file.id)
      );
      const fileInfoPanel = document.querySelector("#file-info");
      const fileName = document.querySelector("#filename");
      const cycleCount = document.querySelector("#cycle-count");
      const cycleList = document.querySelector("#cycle-list");

      fileInfoPanel.style.setProperty("display", "flex", "important");
      fileName.innerText = file.id;
      cycleCount.innerText = cycles.length;

      let listHTML = "";
      for (let i = 0; i < cycles.length; i++) {
        const cycle = cycles[i];
        listHTML += `<li><b>Cycle #${i + 1} (${cycle.length} files)</b><br />`;
        listHTML += cycle
          .map((f) =>
            file.id == f
              ? `<b><code>${f}</code></b><br/>`
              : `<code>${f}</code><br/>`
          )
          .join(`→&nbsp;`);
        listHTML +=
          cycle[0] == file.id
            ? `→&nbsp;<b><code>${cycle[0]}</code></b>`
            : `→&nbsp;<code>${cycle[0]}</code>`;
        listHTML += `</li>`;
      }

      cycleList.innerHTML = listHTML;
    }

    function transformToD3Format(report, filter) {
      const graph = filter(report.graph);
      const files = Object.keys(graph);
      const fileSet = new Set(files);
      cachedFiles = files;
      const nodes = files.map((file) => ({ id: file }));
      const links = [];
      for (const file of files) {
        for (const target of graph[file]) {
          if (fileSet.has(target)) links.push({ source: file, target });
        }
      }
      return { nodes, links };
    }

    function renderGraph(graph, cycles) {
      const width = window.innerWidth;
      const height = window.innerHeight * 0.7;

      const container = document.getElementById("container");
      container.innerHTML = "";

      const canvas = document.createElement("canvas");
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      container.appendChild(canvas);
      const ctx = canvas.getContext("2d");
      ctx.scale(devicePixelRatio, devicePixelRatio);

      const tooltip = d3
        .select("#container")
        .append("div")
        .style("opacity", 0)
        .attr("class", "tooltip")
        .style("background-color", "white")
        .style("border", "solid")
        .style("border-width", "2px")
        .style("border-radius", "5px")
        .style("position", "absolute")
        .style("pointer-events", "none")
        .style("padding", "5px")
        .style("font-size", "12px")
        .style("max-width", "500px")
        .style("z-index", "1000");

      const cycleNodeSet = new Set(cycles.flat());
      const isShowNames = () =>
        document.querySelector("[name=showFileNames]")?.checked;

      let transform = d3.zoomIdentity;
      const nodeRadius = 4;

      const nodeCount = graph.nodes.length;
      const chargeStrength =
        nodeCount > 5000 ? -30 : nodeCount > 1000 ? -80 : -200;
      const linkDist = nodeCount > 5000 ? 20 : nodeCount > 1000 ? 50 : 100;
      const alphaDecay = nodeCount > 5000 ? 0.05 : 0.0228;

      const simulation = d3
        .forceSimulation(graph.nodes)
        .alphaDecay(alphaDecay)
        .force(
          "link",
          d3
            .forceLink(graph.links)
            .id((d) => d.id)
            .distance(linkDist)
        )
        .force("charge", d3.forceManyBody().strength(chargeStrength))
        .force("center", d3.forceCenter(width / 2, height / 2));

      let hoveredNode = null;
      let highlightedCycleNodes = new Set();
      let highlightedCycleLinks = new Set();

      const nodeColorCache = new Map();
      for (const node of graph.nodes) {
        nodeColorCache.set(node, getColor(node.id));
      }

      const colorGroups = new Map();
      for (const node of graph.nodes) {
        const c = nodeColorCache.get(node);
        if (!colorGroups.has(c)) colorGroups.set(c, []);
        colorGroups.get(c).push(node);
      }

      let drawScheduled = false;
      function scheduleDraw() {
        if (drawScheduled) return;
        drawScheduled = true;
        requestAnimationFrame(() => {
          drawScheduled = false;
          draw();
        });
      }

      function draw() {
        ctx.save();
        ctx.clearRect(0, 0, width, height);
        ctx.translate(transform.x, transform.y);
        ctx.scale(transform.k, transform.k);

        ctx.globalAlpha = 0.15;
        ctx.strokeStyle = "#999";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (const link of graph.links) {
          if (
            highlightedCycleLinks.size > 0 &&
            highlightedCycleLinks.has(link.source.id + ">" + link.target.id)
          )
            continue;
          ctx.moveTo(link.source.x, link.source.y);
          ctx.lineTo(link.target.x, link.target.y);
        }
        ctx.stroke();

        if (highlightedCycleLinks.size > 0) {
          ctx.globalAlpha = 1;
          ctx.strokeStyle = "red";
          ctx.lineWidth = 2;
          ctx.beginPath();
          for (const link of graph.links) {
            if (
              !highlightedCycleLinks.has(link.source.id + ">" + link.target.id)
            )
              continue;
            ctx.moveTo(link.source.x, link.source.y);
            ctx.lineTo(link.target.x, link.target.y);
          }
          ctx.stroke();
        }

        ctx.globalAlpha = 1;
        ctx.lineWidth = 0.3;
        ctx.strokeStyle = "#333";
        const tau = 2 * Math.PI;
        for (const [color, nodes] of colorGroups) {
          ctx.fillStyle = color;
          ctx.beginPath();
          for (const n of nodes) {
            if (highlightedCycleNodes.has(n.id)) continue;
            ctx.moveTo(n.x + nodeRadius, n.y);
            ctx.arc(n.x, n.y, nodeRadius, 0, tau);
          }
          ctx.fill();
          ctx.stroke();
        }

        if (highlightedCycleNodes.size > 0) {
          ctx.fillStyle = "red";
          ctx.beginPath();
          for (const node of graph.nodes) {
            if (!highlightedCycleNodes.has(node.id)) continue;
            ctx.moveTo(node.x + nodeRadius, node.y);
            ctx.arc(node.x, node.y, nodeRadius, 0, tau);
          }
          ctx.fill();
          ctx.stroke();
        }

        if (hoveredNode) {
          ctx.fillStyle = "red";
          ctx.strokeStyle = "red";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(hoveredNode.x, hoveredNode.y, nodeRadius + 1, 0, tau);
          ctx.fill();
          ctx.stroke();
        }

        if (isShowNames()) {
          ctx.fillStyle = "#333";
          const fontSize = Math.max(3, 10 / transform.k);
          ctx.font = `${fontSize}px sans-serif`;
          for (const node of graph.nodes) {
            ctx.fillText(node.id, node.x + nodeRadius + 2, node.y + 1);
          }
        }

        ctx.restore();
      }

      simulation.on("tick", scheduleDraw);

      const quadtree = d3
        .quadtree()
        .x((d) => d.x)
        .y((d) => d.y)
        .addAll(graph.nodes);

      simulation.on("tick.quadtree", () => {
        quadtree.visitAfter(() => {});
        quadtree.removeAll(graph.nodes).addAll(graph.nodes);
      });

      function findNodeAt(mx, my) {
        const [x, y] = transform.invert([mx, my]);
        const r = nodeRadius / transform.k + 4;
        let found = null;
        let minDist = r * r;
        quadtree.visit((qnode, x0, y0, x1, y1) => {
          if (x - r > x1 || x + r < x0 || y - r > y1 || y + r < y0) return true;
          if (!qnode.length) {
            let d = qnode;
            do {
              const dx = d.data.x - x,
                dy = d.data.y - y;
              const dist = dx * dx + dy * dy;
              if (dist < minDist) {
                minDist = dist;
                found = d.data;
              }
            } while ((d = d.next));
          }
        });
        return found;
      }

      d3.select(canvas).on("mousemove", (event) => {
        const [mx, my] = d3.pointer(event);
        const found = findNodeAt(mx, my);

        if (found !== hoveredNode) {
          hoveredNode = found;
          highlightedCycleNodes = new Set();
          highlightedCycleLinks = new Set();

          if (found) {
            canvas.style.cursor = "pointer";
            const nodeCycles = cycles.filter((c) => c.includes(found.id));
            found.cycles = nodeCycles;
            for (const cycle of nodeCycles) {
              for (let i = 0; i < cycle.length; i++) {
                highlightedCycleNodes.add(cycle[i]);
                const next = cycle[(i + 1) % cycle.length];
                highlightedCycleLinks.add(cycle[i] + ">" + next);
              }
            }
            tooltip
              .style("opacity", 1)
              .html(`<b>${found.id}</b><br>Cycles: ${nodeCycles.length}`)
              .style("left", event.pageX + 10 + "px")
              .style("top", event.pageY + 10 + "px");
          } else {
            canvas.style.cursor = "default";
            tooltip.style("opacity", 0);
          }
          scheduleDraw();
        } else if (found) {
          tooltip
            .style("left", event.pageX + 10 + "px")
            .style("top", event.pageY + 10 + "px");
        }
      });

      d3.select(canvas).on("click", (event) => {
        const [mx, my] = d3.pointer(event);
        const found = findNodeAt(mx, my);
        if (found) showFileInfo(found);
      });

      d3.select(canvas).call(
        d3
          .drag()
          .subject((event) => {
            const [mx, my] = d3.pointer(event);
            const found = findNodeAt(mx, my);
            if (found) {
              found.fx = found.x;
              found.fy = found.y;
              return found;
            }
            return null;
          })
          .on("start", (event) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
          })
          .on("drag", (event) => {
            event.subject.fx = transform.invertX(event.sourceEvent.offsetX);
            event.subject.fy = transform.invertY(event.sourceEvent.offsetY);
          })
          .on("end", (event) => {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
          })
      );

      d3.select(canvas).call(
        d3
          .zoom()
          .scaleExtent([0.02, 20])
          .on("zoom", (event) => {
            transform = event.transform;
            scheduleDraw();
          })
      );

      window.node = null;
    }

    function updateGraph() {
      if (!window.report) return;

      const checkedTypes = Array.from(
        document.querySelectorAll(".file-type-checkbox:checked")
      ).map((cb) => cb.value);

      const linkDisplay = document.querySelector(
        "[name=graphDisplay]:checked"
      ).value;

      const filter = (graph) => {
        let keys = Object.keys(graph);

        keys = keys.filter((k) => checkedTypes.includes(getFileType(k)));

        if (linkDisplay === "connected") {
          const filteredSet = new Set(keys);
          const hasOutgoing = new Set(
            keys.filter((k) => graph[k].some((dep) => filteredSet.has(dep)))
          );
          const hasIncoming = new Set();
          for (const k of keys) {
            for (const dep of graph[k]) {
              if (filteredSet.has(dep)) hasIncoming.add(dep);
            }
          }
          keys = keys.filter((k) => hasOutgoing.has(k) || hasIncoming.has(k));
        } else if (linkDisplay === "orphans") {
          keys = keys.filter((k) => report.orphans.includes(k));
        } else if (linkDisplay === "cycles") {
          keys = keys.filter((k) =>
            report.cycles.some((cycle) => cycle.includes(k))
          );
        }

        return keys.reduce(
          (obj, k) => ({
            ...obj,
            [k]: graph[k],
          }),
          {}
        );
      };

      const data = transformToD3Format(report, filter);

      // Filter cycles to only include those where ALL nodes are present
      const validFiles = new Set(data.nodes.map((n) => n.id));
      const validCycles = report.cycles.filter((c) =>
        c.every((n) => validFiles.has(n))
      );

      window.currentCycles = validCycles;

      // Update stats
      document.getElementById("stat-files").innerText =
        data.nodes.length.toLocaleString();
      document.getElementById("stat-edges").innerText =
        data.links.length.toLocaleString();
      document.getElementById("stat-cycles").innerText =
        validCycles.length.toLocaleString();

      renderGraph(data, validCycles);
    }

    if (window.report) {
      const fileTypesList = document.getElementById("file-types-list");
      let typesHtml = "";

      const types = Object.keys(report.fileTypes || {}).sort();
      const defaultType = types.sort(
        (a, b) => (report.fileTypes[b] || 0) - (report.fileTypes[a] || 0)
      )[0];

      types.forEach((type) => {
        const count = report.fileTypes[type];
        const color = fileTypeColors[type] || "#6B7280";
        const isDefault = type === defaultType;
        typesHtml += `
          <div class="form-check">
            <input class="form-check-input file-type-checkbox" type="checkbox" value="${type}" id="type-${id(
          type
        )}" ${isDefault ? "checked" : ""}>
            <label class="form-check-label d-flex align-items-center" for="type-${id(
              type
            )}">
              <span style="display:inline-block; width:10px; height:10px; background-color:${color}; border-radius:50%; margin-right:6px;"></span>
              ${type} (${count.toLocaleString()})
            </label>
          </div>
        `;
      });
      fileTypesList.innerHTML = typesHtml;

      document.querySelectorAll(".file-type-checkbox").forEach((cb) => {
        cb.addEventListener("change", updateGraph);
      });

      document
        .getElementById("toggle-all-types")
        .addEventListener("click", (e) => {
          e.preventDefault();
          const allChecked = Array.from(
            document.querySelectorAll(".file-type-checkbox")
          ).every((cb) => cb.checked);
          const targetState = !allChecked;
          document.querySelectorAll(".file-type-checkbox").forEach((cb) => {
            cb.checked = targetState;
          });
          e.target.innerText = targetState ? "Deselect All" : "Select All";
          updateGraph();
        });

      updateGraph();
    }

    // Controls
    document.querySelectorAll("[name=graphDisplay]").forEach((control) => {
      control.onchange = updateGraph;
    });

    document.querySelector("[name=showFileNames]").onchange = () => {
      updateGraph();
    };
  </script>
</html>
