<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Analysis Result</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      html,
      body {
        padding: 0;
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      #container {
        width: 100%;
        height: 70%;
        overflow: hidden;
        position: relative;
      }

      #info-bar {
        width: 100%;
        height: 30%;
        position: fixed;
        left: 0;
        bottom: 0;
        overflow: hidden;
      }

      #file-info {
        height: 100%;
        overflow: auto;
      }
      
      #tooltip {
        position: absolute;
        pointer-events: none;
        background-color: white;
        border: 2px solid #333;
        border-radius: 5px;
        padding: 5px;
        font-size: 12px;
        max-width: 500px;
        z-index: 1000;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="tooltip"></div>
    </div>
    <div id="info-bar" class="bg-light p-4 shadow">
      <div class="row h-100">
        <div class="col-2">
          <h5 class="mb-2">Display</h5>

          <div class="row">
            <div class="col-12">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="graphDisplay"
                  value="cycles"
                  id="cycles"
                  checked
                />
                <label class="form-check-label" for="cycles">Cycles Only</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="graphDisplay"
                  value="connected"
                  id="connected"
                />
                <label class="form-check-label" for="connected"
                  >Connected Only</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="graphDisplay"
                  value="full"
                  id="full"
                />
                <label class="form-check-label" for="full"
                  >Full Graph (slow)</label
                >
              </div>
            </div>
          </div>

          <div class="mb-3 form-check mt-3">
            <input
              class="form-check-input"
              type="checkbox"
              name="showFileNames"
              id="showFileNames"
            />
            <label class="form-check-label" for="showFileNames"
              >Show file names</label
            >
          </div>
        </div>
        <div class="col-3 d-flex flex-column h-100">
          <h5 class="mb-2">File Types</h5>
          <div class="mb-2" style="font-size: 0.85em; color: #555">
            Files: <strong id="stat-files">0</strong> | Edges:
            <strong id="stat-edges">0</strong> | Cycles:
            <strong id="stat-cycles">0</strong>
          </div>
          <div class="mb-2">
            <a
              href="#"
              id="toggle-all-types"
              class="text-decoration-none"
              style="font-size: 0.9em"
              >Select All</a
            >
          </div>
          <div
            class="d-flex flex-column flex-grow-1 overflow-y-auto"
            id="file-types-list"
          ></div>
        </div>
        <div class="col-3 d-flex flex-column h-100">
          <h5 class="mb-2">Search</h5>
          <div class="mb-3 input-group">
            <input
              type="search"
              class="form-control"
              placeholder="Search file..."
              id="search-box"
            />
          </div>
          <div class="d-flex flex-column flex-grow-1 overflow-y-auto">
            <div class="list-group" id="search-result"></div>
          </div>
        </div>
        <div class="col-4 d-flex flex-column h-100">
          <div
            class="mb-3 d-flex flex-column flex-grow-1 overflow-y-auto"
            id="file-info"
            style="display: none !important"
          >
            <h5 class="mb-2">File Info</h5>
            <p><b>File Name:</b>&nbsp;<code id="filename"></code></p>
            <p>
              <b>Cycles (<span id="cycle-count"></span>)</b>:
            </p>
            <ul id="cycle-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </body>
  
  <script src="https://cdn.jsdelivr.net/npm/graphology@0.26.0/dist/graphology.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/graphology-library@0.8.0/dist/graphology-library.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/3.0.0/sigma.min.js"></script>

  <script>
    const id = (nodeId) => btoa(nodeId).replaceAll("=", "");

    let cachedFiles = [];
    window.currentCycles = [];
    
    let graph = null;
    let sigmaInstance = null;
    let isFirstRender = true;

    // Hover state
    const state = {
      hoveredNode: null,
      highlightedNodes: new Set(),
      highlightedEdges: new Set(),
    };

    const getFileType = (filename) => {
      const match = filename.match(/\.[^/.]+$/);
      return match ? match[0] : "";
    };

    const fileTypeColors = {
      ".rb": "#CC342D",
      ".slim": "#8B5CF6",
      ".js": "#F7DF1E",
      ".jsx": "#61DAFB",
      ".ts": "#3178C6",
      ".tsx": "#06B6D4",
    };

    const getColor = (filename) => {
      const ext = getFileType(filename);
      return fileTypeColors[ext] || "#6B7280";
    };

    function search(searchTerm) {
      const searchResultList = document.querySelector("#search-result");
      if (!searchTerm) {
        searchResultList.innerHTML = "";
        return;
      }

      const potentialMatches = cachedFiles.filter((file) =>
        file.includes(searchTerm)
      );

      let html = "";
      for (const file of potentialMatches) {
        html += ` <button type="button" class="list-group-item list-group-item-action search-result" value="${file}">${file}</button>`;
      }
      searchResultList.innerHTML = html;
      document
        .querySelectorAll(".search-result")
        .forEach(
          (result) =>
            (result.onclick = (e) => {
              const nodeId = e.target.value;
              showFileInfo({ id: nodeId });
              if (sigmaInstance && graph && graph.hasNode(nodeId)) {
                const nodePos = sigmaInstance.getNodeDisplayData(nodeId);
                if (nodePos) {
                  sigmaInstance.getCamera().animate({
                    x: nodePos.x,
                    y: nodePos.y,
                    ratio: 0.1,
                  }, { duration: 500 });
                }
              }
            })
        );
    }

    document.getElementById("search-box").oninput = (e) =>
      search(e.target.value);

    function showFileInfo(file) {
      const cycles = window.currentCycles.filter((cycle) =>
        cycle.some((n) => n === file.id)
      );
      const fileInfoPanel = document.querySelector("#file-info");
      const fileName = document.querySelector("#filename");
      const cycleCount = document.querySelector("#cycle-count");
      const cycleList = document.querySelector("#cycle-list");

      fileInfoPanel.style.setProperty("display", "flex", "important");
      fileName.innerText = file.id;
      cycleCount.innerText = cycles.length;

      let listHTML = "";
      for (let i = 0; i < cycles.length; i++) {
        const cycle = cycles[i];
        listHTML += `<li><b>Cycle #${i + 1} (${cycle.length} files)</b><br />`;
        listHTML += cycle
          .map((f) =>
            file.id == f
              ? `<b><code>${f}</code></b><br/>`
              : `<code>${f}</code><br/>`
          )
          .join(`→&nbsp;`);
        listHTML +=
          cycle[0] == file.id
            ? `→&nbsp;<b><code>${cycle[0]}</code></b>`
            : `→&nbsp;<code>${cycle[0]}</code>`;
        listHTML += `</li>`;
      }

      cycleList.innerHTML = listHTML;
    }

    function initSigma() {
      graph = new graphology.Graph();
      const container = document.getElementById("container");
      const tooltip = document.getElementById("tooltip");

      sigmaInstance = new Sigma(graph, container, {
        renderLabels: document.querySelector("[name=showFileNames]")?.checked || false,
        labelSize: 12,
        labelThreshold: 7,
        minCameraRatio: 0.01,
        maxCameraRatio: 20,
        defaultEdgeColor: "#cccccc",
        defaultEdgeType: "arrow",
        labelRenderedSizeThreshold: 5,
      });

      sigmaInstance.on("enterNode", (e) => {
        const node = e.node;
        state.hoveredNode = node;
        state.highlightedNodes = new Set();
        state.highlightedEdges = new Set();

        const nodeCycles = window.currentCycles.filter((c) => c.includes(node));
        for (const cycle of nodeCycles) {
          for (let i = 0; i < cycle.length; i++) {
            state.highlightedNodes.add(cycle[i]);
            const next = cycle[(i + 1) % cycle.length];
            if (graph.hasEdge(cycle[i], next)) {
              state.highlightedEdges.add(graph.edge(cycle[i], next));
            }
          }
        }
        state.highlightedNodes.add(node);

        tooltip.innerHTML = `<b>${node}</b><br>Cycles: ${nodeCycles.length}`;
        tooltip.style.display = "block";
        
        sigmaInstance.refresh();
      });

      sigmaInstance.on("leaveNode", () => {
        state.hoveredNode = null;
        state.highlightedNodes = new Set();
        state.highlightedEdges = new Set();
        
        tooltip.style.display = "none";
        sigmaInstance.refresh();
      });

      container.addEventListener("mousemove", (e) => {
        if (state.hoveredNode) {
          tooltip.style.left = e.pageX + 15 + "px";
          tooltip.style.top = e.pageY + 15 + "px";
        }
      });

      sigmaInstance.on("clickNode", (e) => {
        showFileInfo({ id: e.node });
      });

      sigmaInstance.setSetting("nodeReducer", (node, data) => {
        const res = { ...data };
        if (state.hoveredNode) {
          if (state.highlightedNodes.has(node)) {
            res.color = "red";
            res.zIndex = 1;
          } else {
            res.color = "#eeeeee";
            res.zIndex = 0;
          }
        }
        return res;
      });

      sigmaInstance.setSetting("edgeReducer", (edge, data) => {
        const res = { ...data };
        if (state.hoveredNode) {
          if (state.highlightedEdges.has(edge)) {
            res.color = "red";
            res.size = 2;
            res.zIndex = 1;
          } else {
            res.color = "#eeeeee";
            res.hidden = true;
          }
        }
        return res;
      });
    }

    function updateGraph() {
      if (!window.report) return;

      if (!sigmaInstance) {
        initSigma();
      }

      const checkedTypes = Array.from(
        document.querySelectorAll(".file-type-checkbox:checked")
      ).map((cb) => cb.value);

      const linkDisplay = document.querySelector(
        "[name=graphDisplay]:checked"
      ).value;

      // Reset Sigma render labels
      sigmaInstance.setSetting("renderLabels", document.querySelector("[name=showFileNames]").checked);

      const filter = (g) => {
        let keys = Object.keys(g);

        keys = keys.filter((k) => checkedTypes.includes(getFileType(k)));

        if (linkDisplay === "connected") {
          const filteredSet = new Set(keys);
          const hasOutgoing = new Set(
            keys.filter((k) => g[k].some((dep) => filteredSet.has(dep)))
          );
          const hasIncoming = new Set();
          for (const k of keys) {
            for (const dep of g[k]) {
              if (filteredSet.has(dep)) hasIncoming.add(dep);
            }
          }
          keys = keys.filter((k) => hasOutgoing.has(k) || hasIncoming.has(k));
        } else if (linkDisplay === "cycles") {
          keys = keys.filter((k) =>
            report.cycles.some((cycle) => cycle.includes(k))
          );
        }

        return keys.reduce(
          (obj, k) => ({
            ...obj,
            [k]: g[k],
          }),
          {}
        );
      };

      const filteredGraphData = filter(report.graph);
      const files = Object.keys(filteredGraphData);
      const fileSet = new Set(files);
      cachedFiles = files;

      graph.clear();

      const validCycles = report.cycles.filter((c) =>
        c.every((n) => fileSet.has(n))
      );
      window.currentCycles = validCycles;

      for (const filePath of files) {
        graph.addNode(filePath, {
          label: filePath,
          x: Math.random(),
          y: Math.random(),
          size: 3,
          color: getColor(filePath),
        });
      }

      for (const source of files) {
        for (const target of filteredGraphData[source]) {
          if (fileSet.has(target) && !graph.hasEdge(source, target)) {
            graph.addEdge(source, target, { color: "#cccccc", type: "arrow" });
          }
        }
      }

      document.getElementById("stat-files").innerText = graph.order.toLocaleString();
      document.getElementById("stat-edges").innerText = graph.size.toLocaleString();
      document.getElementById("stat-cycles").innerText = validCycles.length.toLocaleString();

      if (graph.order > 0) {
        const iterations = isFirstRender ? 100 : 50;
        isFirstRender = false;
        const fa2Settings = graphologyLibrary.layoutForceAtlas2.inferSettings(graph);
        graphologyLibrary.layoutForceAtlas2.assign(graph, {
          iterations: iterations,
          settings: { ...fa2Settings, barnesHutOptimize: true },
        });
      }

      sigmaInstance.refresh();
      // Zoom to fit all nodes
      if (graph.order > 0) {
        sigmaInstance.getCamera().animatedReset({ duration: 500 });
      }
    }

    if (window.report) {
      const fileTypesList = document.getElementById("file-types-list");
      let typesHtml = "";

      const types = Object.keys(report.fileTypes || {}).sort();
      const defaultType = types.sort(
        (a, b) => (report.fileTypes[b] || 0) - (report.fileTypes[a] || 0)
      )[0];

      types.forEach((type) => {
        const count = report.fileTypes[type];
        const color = fileTypeColors[type] || "#6B7280";
        const isDefault = type === defaultType;
        typesHtml += `
          <div class="form-check">
            <input class="form-check-input file-type-checkbox" type="checkbox" value="${type}" id="type-${id(
          type
        )}" ${isDefault ? "checked" : ""}>
            <label class="form-check-label d-flex align-items-center" for="type-${id(
              type
            )}">
              <span style="display:inline-block; width:10px; height:10px; background-color:${color}; border-radius:50%; margin-right:6px;"></span>
              ${type} (${count.toLocaleString()})
            </label>
          </div>
        `;
      });
      fileTypesList.innerHTML = typesHtml;

      document.querySelectorAll(".file-type-checkbox").forEach((cb) => {
        cb.addEventListener("change", updateGraph);
      });

      document
        .getElementById("toggle-all-types")
        .addEventListener("click", (e) => {
          e.preventDefault();
          const allChecked = Array.from(
            document.querySelectorAll(".file-type-checkbox")
          ).every((cb) => cb.checked);
          const targetState = !allChecked;
          document.querySelectorAll(".file-type-checkbox").forEach((cb) => {
            cb.checked = targetState;
          });
          e.target.innerText = targetState ? "Deselect All" : "Select All";
          updateGraph();
        });

      updateGraph();
    }

    // Controls
    document.querySelectorAll("[name=graphDisplay]").forEach((control) => {
      control.onchange = updateGraph;
    });

    document.querySelector("[name=showFileNames]").onchange = () => {
      updateGraph();
    };
  </script>
</html>
